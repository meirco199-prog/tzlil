<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>מרחב רגשי — ניהול טיפולים לילדים ונוער</title>
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Secular+One&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1F3A43;
  --ink-soft:#4A6570;
  --paper:#F2F7F7;
  --card:#FFFFFF;
  --teal:#177E89;
  --teal-deep:#0F5B63;
  --sun:#FFC145;
  --blush:#FFB5A7;
  --mint:#BFe3d0;
  --line:#DCE8E9;
  --danger:#D6455D;
  --radius:18px;
  --shadow:0 4px 16px rgba(31,58,67,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Varela Round',sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  font-size:16px;
}
h1,h2,h3{font-family:'Secular One',sans-serif;font-weight:400}

/* ---------- header ---------- */
header{
  background:var(--card);
  border-bottom:2px solid var(--line);
  padding:14px 20px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:20;
}
.logo{
  width:42px;height:42px;border-radius:14px;
  background:var(--teal);display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
}
header h1{font-size:1.25rem;color:var(--teal-deep);line-height:1.1}
header .sub{font-size:.78rem;color:var(--ink-soft)}
.back-btn{
  margin-inline-start:auto;
  background:none;border:2px solid var(--line);border-radius:12px;
  padding:8px 14px;font-family:inherit;font-size:.9rem;color:var(--ink);
  cursor:pointer;display:none;
}
.back-btn:hover{border-color:var(--teal)}

main{max-width:960px;margin:0 auto;padding:20px 16px 80px}

/* ---------- buttons & inputs ---------- */
.btn{
  border:none;border-radius:14px;padding:11px 18px;
  font-family:inherit;font-size:.95rem;cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;
  transition:transform .12s, box-shadow .12s;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--teal);color:#fff;box-shadow:0 3px 0 var(--teal-deep)}
.btn-sun{background:var(--sun);color:var(--ink);box-shadow:0 3px 0 #D99C1E}
.btn-ghost{background:transparent;border:2px solid var(--line);color:var(--ink)}
.btn-ghost:hover{border-color:var(--teal)}
.btn-danger{background:transparent;border:2px solid #F2C7CE;color:var(--danger)}
.btn-danger:hover{background:#FDEDF0}
.btn-small{padding:7px 12px;font-size:.85rem;border-radius:11px}

input,textarea,select{
  width:100%;font-family:inherit;font-size:1rem;color:var(--ink);
  background:#fff;border:2px solid var(--line);border-radius:13px;
  padding:11px 13px;outline:none;
}
input:focus,textarea:focus,select:focus{border-color:var(--teal)}
textarea{resize:vertical;min-height:90px}
label{display:block;font-size:.85rem;color:var(--ink-soft);margin:12px 0 5px}
label:first-child{margin-top:0}

/* ---------- cards ---------- */
.card{
  background:var(--card);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:18px;
}
.section-title{
  display:flex;align-items:center;gap:10px;margin:26px 0 14px;
}
.section-title h2{font-size:1.15rem;color:var(--teal-deep)}
.scribble{
  height:6px;flex:1;border-radius:3px;
  background:repeating-linear-gradient(-60deg,var(--sun) 0 8px,transparent 8px 14px);
  opacity:.7;
}

/* ---------- children grid ---------- */
.kids-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.kid-card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:16px;cursor:pointer;border:2px solid transparent;
  transition:transform .15s,border-color .15s;position:relative;overflow:hidden;
}
.kid-card:hover{transform:translateY(-3px);border-color:var(--teal)}
.kid-card::before{
  content:"";position:absolute;top:0;right:0;left:0;height:7px;
  background:var(--kid-color,var(--mint));
}
.kid-avatar{
  width:52px;height:52px;border-radius:50%;
  background:var(--kid-color,var(--mint));
  display:flex;align-items:center;justify-content:center;
  font-family:'Secular One';font-size:1.3rem;color:var(--ink);
  margin-bottom:10px;margin-top:6px;
}
.kid-card h3{font-size:1.1rem;margin-bottom:3px}
.kid-card .meta{font-size:.82rem;color:var(--ink-soft)}

.empty-state{
  text-align:center;padding:46px 20px;color:var(--ink-soft);
  background:var(--card);border-radius:var(--radius);border:2px dashed var(--line);
}
.empty-state .big{font-size:2.4rem;margin-bottom:10px}

/* ---------- tabs ---------- */
.tabs{
  display:flex;gap:6px;background:var(--card);padding:6px;border-radius:16px;
  box-shadow:var(--shadow);margin:18px 0;overflow-x:auto;
}
.tab{
  flex:1;border:none;background:transparent;border-radius:12px;
  padding:10px 8px;font-family:inherit;font-size:.9rem;color:var(--ink-soft);
  cursor:pointer;white-space:nowrap;min-width:90px;
}
.tab.active{background:var(--teal);color:#fff}

/* ---------- lists ---------- */
.item-row{
  background:var(--card);border-radius:14px;box-shadow:var(--shadow);
  padding:14px 16px;margin-bottom:10px;
}
.item-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.item-head strong{font-size:1rem}
.item-date{font-size:.78rem;color:var(--ink-soft);background:var(--paper);padding:3px 9px;border-radius:8px}
.item-body{margin-top:8px;font-size:.93rem;color:var(--ink);white-space:pre-wrap;line-height:1.55}
.item-actions{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}

/* ---------- modal ---------- */
.modal-bg{
  position:fixed;inset:0;background:rgba(31,58,67,.45);
  display:none;align-items:flex-end;justify-content:center;z-index:50;padding:0;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:560px;
  padding:22px 20px 30px;max-height:88vh;overflow-y:auto;
  animation:slideUp .22s ease;
}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(min-width:640px){
  .modal-bg{align-items:center;padding:20px}
  .modal{border-radius:22px}
}
.modal h2{font-size:1.2rem;color:var(--teal-deep);margin-bottom:6px}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-actions .btn{flex:1;justify-content:center}

/* ---------- drawing ---------- */
.draw-wrap{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px}
.draw-toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.crayon{
  width:34px;height:34px;border-radius:50%;border:3px solid #fff;
  box-shadow:0 0 0 2px var(--line);cursor:pointer;flex-shrink:0;
  transition:transform .12s;
}
.crayon.sel{box-shadow:0 0 0 3px var(--ink);transform:scale(1.12)}
#canvas{
  width:100%;border-radius:14px;border:2px solid var(--line);
  background:#fff;touch-action:none;cursor:crosshair;display:block;
}
.size-btn{
  width:34px;height:34px;border-radius:10px;background:var(--paper);
  border:2px solid var(--line);cursor:pointer;display:flex;
  align-items:center;justify-content:center;
}
.size-btn.sel{border-color:var(--teal);background:#E3F1F2}
.size-dot{border-radius:50%;background:var(--ink)}

.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:16px}
.gal-item{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:8px;text-align:center}
.gal-item img{width:100%;border-radius:10px;border:1px solid var(--line);background:#fff}
.gal-item .meta{font-size:.75rem;color:var(--ink-soft);margin:6px 0}

/* ---------- payments ---------- */
.pay-summary{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px;
}
.pay-box{
  background:var(--card);border-radius:14px;box-shadow:var(--shadow);
  padding:14px;text-align:center;
}
.pay-box .num{font-family:'Secular One';font-size:1.5rem;color:var(--teal-deep)}
.pay-box .lbl{font-size:.78rem;color:var(--ink-soft)}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
th,td{padding:12px 14px;text-align:right;font-size:.9rem}
th{background:var(--teal);color:#fff;font-weight:400;font-family:'Secular One'}
tr:not(:last-child) td{border-bottom:1px solid var(--line)}
.month-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.month-nav input{max-width:190px}

.file-chip{
  display:inline-flex;align-items:center;gap:8px;background:var(--paper);
  border-radius:11px;padding:8px 12px;font-size:.85rem;
}

/* ---------- toast ---------- */
#toast{
  position:fixed;bottom:22px;right:50%;transform:translateX(50%);
  background:var(--ink);color:#fff;padding:12px 22px;border-radius:14px;
  font-size:.9rem;opacity:0;pointer-events:none;transition:opacity .25s;z-index:99;
  max-width:90vw;text-align:center;
}
#toast.show{opacity:1}

.top-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.child-header{display:flex;align-items:center;gap:14px;margin-bottom:4px}
.child-header .kid-avatar{margin:0;width:58px;height:58px;font-size:1.5rem}
.child-header .info h2{font-size:1.35rem;color:var(--teal-deep)}
.child-header .info .meta{font-size:.85rem;color:var(--ink-soft)}
.hidden{display:none!important}
.loading{text-align:center;color:var(--ink-soft);padding:40px}
.hint{font-size:.78rem;color:var(--ink-soft);margin-top:6px}
</style>
</head>
<body>

<header>
  <div class="logo">🌱</div>
  <div>
    <h1>מרחב רגשי</h1>
    <div class="sub">ניהול טיפולים רגשיים לילדים ונוער</div>
  </div>
  <button class="back-btn" id="backBtn" onclick="goHome()">→ חזרה</button>
</header>

<main id="app"><div class="loading">טוען נתונים…</div></main>

<div class="modal-bg" id="modalBg"><div class="modal" id="modalBox"></div></div>
<div id="toast"></div>

<script>
/* ================= storage helpers ================= */
const S = window.storage;
async function sGet(key){
  try{ const r = await S.get(key,false); return r ? JSON.parse(r.value) : null; }
  catch(e){ return null; }
}
async function sSet(key,val){
  try{ const r = await S.set(key,JSON.stringify(val),false); return !!r; }
  catch(e){ toast('שמירה נכשלה — נסו שוב'); return false; }
}
async function sDel(key){ try{ await S.delete(key,false); }catch(e){} }

/* ================= state ================= */
let children = [];
let payments = [];
let currentChild = null;
let currentTab = 'notes';
let view = 'home'; // home | child | monthly
const KID_COLORS = ['#BFE3D0','#FFD9A0','#F9C6D0','#C5D8F5','#E4D2F2','#FFE9A8','#BEE6E8'];

const app = document.getElementById('app');
const backBtn = document.getElementById('backBtn');

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm = setTimeout(()=>t.classList.remove('show'),2400);
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'});
}
function fmtMoney(n){ return '₪' + Number(n||0).toLocaleString('he-IL'); }
function monthLabel(ym){
  const [y,m] = ym.split('-');
  const names = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  return names[parseInt(m)-1] + ' ' + y;
}
function todayISO(){ return new Date().toISOString().slice(0,10); }
function thisMonth(){ return new Date().toISOString().slice(0,7); }

/* ================= modal ================= */
const modalBg = document.getElementById('modalBg');
const modalBox = document.getElementById('modalBox');
function openModal(html){ modalBox.innerHTML = html; modalBg.classList.add('open'); }
function closeModal(){ modalBg.classList.remove('open'); modalBox.innerHTML=''; }
modalBg.addEventListener('click', e => { if(e.target === modalBg) closeModal(); });

/* ================= init ================= */
async function init(){
  children = (await sGet('children')) || [];
  payments = (await sGet('payments')) || [];
  goHome();
}

/* ================= HOME ================= */
function goHome(){
  view='home'; currentChild=null; backBtn.style.display='none';
  renderHome();
}
function renderHome(){
  let kidsHtml;
  if(children.length===0){
    kidsHtml = `<div class="empty-state">
      <div class="big">🧸</div>
      <div>עדיין אין ילדים במערכת.<br>לחצו על ״הוספת ילד/ה״ כדי להתחיל.</div>
    </div>`;
  } else {
    kidsHtml = `<div class="kids-grid">` + children.map(c=>`
      <div class="kid-card" style="--kid-color:${c.color}" onclick="openChild('${c.id}')">
        <div class="kid-avatar">${esc(c.name.charAt(0))}</div>
        <h3>${esc(c.name)}</h3>
        <div class="meta">${c.age ? 'גיל ' + esc(c.age) : ''}${c.age && c.parent ? ' · ' : ''}${c.parent ? esc(c.parent) : ''}</div>
      </div>`).join('') + `</div>`;
  }

  const monthSum = payments.filter(p=>p.month===thisMonth()).reduce((a,p)=>a+Number(p.amount),0);

  app.innerHTML = `
    <div class="top-actions">
      <button class="btn btn-primary" onclick="openAddChild()">＋ הוספת ילד/ה</button>
      <button class="btn btn-sun" onclick="goMonthly()">💰 מעקב תשלומים חודשי</button>
    </div>
    <div class="pay-summary" style="margin-top:16px">
      <div class="pay-box"><div class="num">${children.length}</div><div class="lbl">ילדים בטיפול</div></div>
      <div class="pay-box"><div class="num">${fmtMoney(monthSum)}</div><div class="lbl">התקבל ב${monthLabel(thisMonth())}</div></div>
    </div>
    <div class="section-title"><h2>הילדים שלי</h2><div class="scribble"></div></div>
    ${kidsHtml}
  `;
}

/* ================= add / edit child ================= */
function openAddChild(editId){
  const c = editId ? children.find(x=>x.id===editId) : null;
  openModal(`
    <h2>${c ? 'עריכת פרטי ילד/ה' : 'הוספת ילד/ה'}</h2>
    <label>שם *</label>
    <input id="f_name" value="${c?esc(c.name):''}" placeholder="שם הילד/ה">
    <label>גיל</label>
    <input id="f_age" inputmode="numeric" value="${c?esc(c.age||''):''}" placeholder="למשל 9">
    <label>שם ההורה / איש קשר</label>
    <input id="f_parent" value="${c?esc(c.parent||''):''}" placeholder="שם ההורה">
    <label>טלפון</label>
    <input id="f_phone" inputmode="tel" value="${c?esc(c.phone||''):''}" placeholder="050-0000000">
    <label>רקע כללי / סיבת פנייה</label>
    <textarea id="f_bg" placeholder="מידע רקע חשוב…">${c?esc(c.bg||''):''}</textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">ביטול</button>
      <button class="btn btn-primary" onclick="saveChild('${editId||''}')">שמירה</button>
    </div>
  `);
}
async function saveChild(editId){
  const name = document.getElementById('f_name').value.trim();
  if(!name){ toast('חסר שם'); return; }
  const data = {
    name,
    age: document.getElementById('f_age').value.trim(),
    parent: document.getElementById('f_parent').value.trim(),
    phone: document.getElementById('f_phone').value.trim(),
    bg: document.getElementById('f_bg').value.trim(),
  };
  if(editId){
    const c = children.find(x=>x.id===editId);
    Object.assign(c,data);
  } else {
    children.push({ id: uid(), color: KID_COLORS[children.length % KID_COLORS.length], createdAt: todayISO(), ...data });
  }
  if(await sSet('children',children)){
    closeModal(); toast('נשמר ✓');
    if(view==='child' && currentChild) renderChild(); else renderHome();
  }
}
function confirmDeleteChild(id){
  const c = children.find(x=>x.id===id);
  openModal(`
    <h2>מחיקת ${esc(c.name)}</h2>
    <p style="margin-top:8px;color:var(--ink-soft);font-size:.92rem">
      פעולה זו תמחק את כרטיס הילד/ה כולל כל התיעוד, המסמכים, הציורים והתשלומים. לא ניתן לשחזר.
    </p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">ביטול</button>
      <button class="btn btn-danger" onclick="deleteChild('${id}')">כן, למחוק</button>
    </div>
  `);
}
async function deleteChild(id){
  children = children.filter(x=>x.id!==id);
  await sSet('children',children);
  payments = payments.filter(p=>p.childId!==id);
  await sSet('payments',payments);
  await sDel('notes:'+id);
  try{
    const fl = await S.list('fidx:'+id,false); // index key
  }catch(e){}
  const fidx = (await sGet('fidx:'+id)) || [];
  for(const f of fidx) await sDel('file:'+f.id);
  await sDel('fidx:'+id);
  const didx = (await sGet('didx:'+id)) || [];
  for(const d of didx) await sDel('draw:'+d.id);
  await sDel('didx:'+id);
  closeModal(); toast('נמחק'); goHome();
}

/* ================= CHILD PAGE ================= */
function openChild(id){
  currentChild = children.find(x=>x.id===id);
  view='child'; currentTab='notes';
  backBtn.style.display='inline-flex';
  renderChild();
}
function setTab(t){ currentTab=t; renderChild(); }

async function renderChild(){
  const c = currentChild;
  app.innerHTML = `
    <div class="child-header">
      <div class="kid-avatar" style="background:${c.color}">${esc(c.name.charAt(0))}</div>
      <div class="info">
        <h2>${esc(c.name)}</h2>
        <div class="meta">
          ${c.age ? 'גיל ' + esc(c.age) : ''}
          ${c.parent ? ' · הורה: ' + esc(c.parent) : ''}
          ${c.phone ? ' · ' + esc(c.phone) : ''}
        </div>
      </div>
    </div>
    ${c.bg ? `<div class="card" style="margin-top:10px;font-size:.9rem;color:var(--ink-soft)">📋 ${esc(c.bg)}</div>` : ''}
    <div class="top-actions" style="margin-top:12px">
      <button class="btn btn-ghost btn-small" onclick="openAddChild('${c.id}')">✏️ עריכת פרטים</button>
      <button class="btn btn-danger btn-small" onclick="confirmDeleteChild('${c.id}')">🗑 מחיקה</button>
    </div>
    <div class="tabs">
      <button class="tab ${currentTab==='notes'?'active':''}" onclick="setTab('notes')">📝 מעקב</button>
      <button class="tab ${currentTab==='files'?'active':''}" onclick="setTab('files')">📎 מסמכים</button>
      <button class="tab ${currentTab==='draw'?'active':''}" onclick="setTab('draw')">🖍️ ציור</button>
      <button class="tab ${currentTab==='pay'?'active':''}" onclick="setTab('pay')">💰 תשלומים</button>
    </div>
    <div id="tabContent"><div class="loading">טוען…</div></div>
  `;
  if(currentTab==='notes') renderNotes();
  else if(currentTab==='files') renderFiles();
  else if(currentTab==='draw') renderDraw();
  else renderChildPay();
}

/* ---------- notes (tracking) ---------- */
async function renderNotes(){
  const notes = (await sGet('notes:'+currentChild.id)) || [];
  notes.sort((a,b)=> (b.date||'').localeCompare(a.date||''));
  const box = document.getElementById('tabContent');
  box.innerHTML = `
    <button class="btn btn-primary" onclick="openAddNote()">＋ רישום מעקב חדש</button>
    <div style="margin-top:14px">
      ${notes.length===0
        ? `<div class="empty-state"><div class="big">📝</div>אין עדיין רישומי מעקב.<br>כאן מתעדים פגישות, התרשמויות והתקדמות.</div>`
        : notes.map(n=>`
          <div class="item-row">
            <div class="item-head">
              <strong>${esc(n.title||'רישום מעקב')}</strong>
              <span class="item-date">${fmtDate(n.date)}</span>
            </div>
            <div class="item-body">${esc(n.text)}</div>
            <div class="item-actions">
              <button class="btn btn-ghost btn-small" onclick="openAddNote('${n.id}')">עריכה</button>
              <button class="btn btn-danger btn-small" onclick="deleteNote('${n.id}')">מחיקה</button>
            </div>
          </div>`).join('')}
    </div>`;
}
async function openAddNote(editId){
  const notes = (await sGet('notes:'+currentChild.id)) || [];
  const n = editId ? notes.find(x=>x.id===editId) : null;
  openModal(`
    <h2>${n ? 'עריכת רישום' : 'רישום מעקב חדש'}</h2>
    <label>תאריך</label>
    <input id="n_date" type="date" value="${n?n.date:todayISO()}">
    <label>כותרת</label>
    <input id="n_title" value="${n?esc(n.title||''):''}" placeholder="למשל: פגישה שבועית, שיחת הורים…">
    <label>תוכן המעקב</label>
    <textarea id="n_text" style="min-height:140px" placeholder="מה עלה בפגישה, התרשמות, מטרות להמשך…">${n?esc(n.text):''}</textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">ביטול</button>
      <button class="btn btn-primary" onclick="saveNote('${editId||''}')">שמירה</button>
    </div>
  `);
}
async function saveNote(editId){
  const text = document.getElementById('n_text').value.trim();
  if(!text){ toast('הרישום ריק'); return; }
  const notes = (await sGet('notes:'+currentChild.id)) || [];
  const data = {
    date: document.getElementById('n_date').value || todayISO(),
    title: document.getElementById('n_title').value.trim(),
    text
  };
  if(editId){
    Object.assign(notes.find(x=>x.id===editId), data);
  } else {
    notes.push({ id: uid(), ...data });
  }
  if(await sSet('notes:'+currentChild.id, notes)){
    closeModal(); toast('נשמר ✓'); renderNotes();
  }
}
async function deleteNote(id){
  let notes = (await sGet('notes:'+currentChild.id)) || [];
  notes = notes.filter(x=>x.id!==id);
  await sSet('notes:'+currentChild.id, notes);
  toast('נמחק'); renderNotes();
}

/* ---------- files (documents) ---------- */
async function renderFiles(){
  const idx = (await sGet('fidx:'+currentChild.id)) || [];
  idx.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const box = document.getElementById('tabContent');
  box.innerHTML = `
    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">＋ העלאת מסמך</button>
    <input type="file" id="fileInput" class="hidden" accept="image/*,.pdf" onchange="uploadFile(this)">
    <div class="hint">אפשר להעלות תמונות וקבצי PDF עד ‎3MB (אבחונים, סיכומים, טפסים…)</div>
    <div style="margin-top:14px">
      ${idx.length===0
        ? `<div class="empty-state"><div class="big">📎</div>אין עדיין מסמכים.<br>העלו כאן אבחונים, סיכומים ומסמכי מעקב.</div>`
        : idx.map(f=>`
          <div class="item-row">
            <div class="item-head">
              <strong>${f.type==='application/pdf'?'📄':'🖼️'} ${esc(f.name)}</strong>
              <span class="item-date">${fmtDate(f.date)} · ${(f.size/1024).toFixed(0)}KB</span>
            </div>
            <div class="item-actions">
              <button class="btn btn-ghost btn-small" onclick="viewFile('${f.id}')">צפייה / הורדה</button>
              <button class="btn btn-danger btn-small" onclick="deleteFile('${f.id}')">מחיקה</button>
            </div>
          </div>`).join('')}
    </div>`;
}
async function uploadFile(input){
  const file = input.files[0];
  if(!file) return;
  if(file.size > 3*1024*1024){ toast('הקובץ גדול מדי (מעל 3MB)'); input.value=''; return; }
  toast('מעלה…');
  const dataUrl = await new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = ()=>res(r.result);
    r.onerror = ()=>rej();
    r.readAsDataURL(file);
  });
  const id = uid();
  const ok = await sSet('file:'+id, { data: dataUrl, name: file.name, type: file.type });
  if(!ok){ input.value=''; return; }
  const idx = (await sGet('fidx:'+currentChild.id)) || [];
  idx.push({ id, name: file.name, type: file.type, size: file.size, date: todayISO() });
  await sSet('fidx:'+currentChild.id, idx);
  input.value='';
  toast('המסמך נשמר ✓');
  renderFiles();
}
async function viewFile(id){
  const f = await sGet('file:'+id);
  if(!f){ toast('הקובץ לא נמצא'); return; }
  if(f.type && f.type.startsWith('image/')){
    openModal(`
      <h2>${esc(f.name)}</h2>
      <img src="${f.data}" style="width:100%;border-radius:12px;margin-top:10px;border:1px solid var(--line)">
      <div class="modal-actions">
        <a class="btn btn-primary" style="justify-content:center;text-decoration:none" href="${f.data}" download="${esc(f.name)}">⬇️ הורדה</a>
        <button class="btn btn-ghost" onclick="closeModal()">סגירה</button>
      </div>`);
  } else {
    const a = document.createElement('a');
    a.href = f.data; a.download = f.name; a.click();
  }
}
async function deleteFile(id){
  await sDel('file:'+id);
  let idx = (await sGet('fidx:'+currentChild.id)) || [];
  idx = idx.filter(x=>x.id!==id);
  await sSet('fidx:'+currentChild.id, idx);
  toast('נמחק'); renderFiles();
}

/* ---------- drawing ---------- */
const CRAYONS = ['#E63946','#F77F00','#FFC145','#2A9D34','#177E89','#3A5BD9','#8E44AD','#E85D9A','#8B5A2B','#1F3A43'];
let drawColor = CRAYONS[0], drawSize = 6, erasing = false;

async function renderDraw(){
  const idx = (await sGet('didx:'+currentChild.id)) || [];
  idx.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const box = document.getElementById('tabContent');
  box.innerHTML = `
    <div class="draw-wrap">
      <div class="draw-toolbar" id="crayons">
        ${CRAYONS.map(c=>`<div class="crayon ${c===drawColor&&!erasing?'sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`).join('')}
        <button class="size-btn ${erasing?'sel':''}" title="מחק" onclick="pickEraser()" style="font-size:16px">🧽</button>
      </div>
      <div class="draw-toolbar">
        ${[3,6,12,22].map(s=>`
          <button class="size-btn ${s===drawSize?'sel':''}" onclick="pickSize(${s})">
            <span class="size-dot" style="width:${Math.min(s,20)}px;height:${Math.min(s,20)}px"></span>
          </button>`).join('')}
        <span style="flex:1"></span>
        <button class="btn btn-ghost btn-small" onclick="undoDraw()">↩️ בטל</button>
        <button class="btn btn-ghost btn-small" onclick="clearCanvas()">🗑 נקה</button>
        <button class="btn btn-sun btn-small" onclick="saveDrawing()">💾 שמירת ציור</button>
      </div>
      <canvas id="canvas" width="900" height="620"></canvas>
    </div>
    <div class="section-title"><h2>הציורים של ${esc(currentChild.name)}</h2><div class="scribble"></div></div>
    ${idx.length===0
      ? `<div class="empty-state"><div class="big">🎨</div>עדיין אין ציורים שמורים.</div>`
      : `<div class="gallery" id="gallery">${idx.map(d=>`
          <div class="gal-item" id="gal-${d.id}">
            <img data-did="${d.id}" alt="ציור">
            <div class="meta">${fmtDate(d.date)}</div>
            <button class="btn btn-danger btn-small" onclick="deleteDrawing('${d.id}')">מחיקה</button>
          </div>`).join('')}</div>`}
  `;
  setupCanvas();
  // load gallery images progressively
  for(const d of idx){
    const rec = await sGet('draw:'+d.id);
    const img = document.querySelector(`img[data-did="${d.id}"]`);
    if(img && rec) img.src = rec.data;
  }
}
function pickColor(c){ drawColor=c; erasing=false; renderToolbarSel(); }
function pickEraser(){ erasing=true; renderToolbarSel(); }
function pickSize(s){ drawSize=s; renderToolbarSel(); }
function renderToolbarSel(){
  document.querySelectorAll('#crayons .crayon').forEach((el,i)=>{
    el.classList.toggle('sel', CRAYONS[i]===drawColor && !erasing);
  });
  document.querySelectorAll('.size-btn').forEach(el=>{
    if(el.textContent.includes('🧽')) el.classList.toggle('sel', erasing);
  });
  document.querySelectorAll('.size-btn .size-dot').forEach(dot=>{
    const s = parseInt(dot.style.width);
    dot.parentElement.classList.toggle('sel', s===Math.min(drawSize,20));
  });
}

let cvs, ctx, drawing=false, undoStack=[];
function setupCanvas(){
  cvs = document.getElementById('canvas');
  ctx = cvs.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,cvs.width,cvs.height);
  ctx.lineCap='round'; ctx.lineJoin='round';
  undoStack=[];
  const pos = e => {
    const r = cvs.getBoundingClientRect();
    return { x:(e.clientX-r.left)*(cvs.width/r.width), y:(e.clientY-r.top)*(cvs.height/r.height) };
  };
  cvs.onpointerdown = e => {
    e.preventDefault();
    cvs.setPointerCapture(e.pointerId);
    if(undoStack.length>=12) undoStack.shift();
    undoStack.push(ctx.getImageData(0,0,cvs.width,cvs.height));
    drawing=true;
    const p=pos(e);
    ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+0.1,p.y+0.1);
    strokeNow();
  };
  cvs.onpointermove = e => {
    if(!drawing) return;
    e.preventDefault();
    const p=pos(e);
    ctx.lineTo(p.x,p.y);
    strokeNow();
  };
  cvs.onpointerup = cvs.onpointercancel = ()=>{ drawing=false; };
}
function strokeNow(){
  ctx.strokeStyle = erasing ? '#ffffff' : drawColor;
  ctx.lineWidth = erasing ? drawSize*3 : drawSize;
  ctx.stroke();
}
function undoDraw(){
  if(undoStack.length===0) return;
  ctx.putImageData(undoStack.pop(),0,0);
}
function clearCanvas(){
  if(undoStack.length>=12) undoStack.shift();
  undoStack.push(ctx.getImageData(0,0,cvs.width,cvs.height));
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,cvs.width,cvs.height);
}
async function saveDrawing(){
  const data = cvs.toDataURL('image/jpeg',0.82);
  const id = uid();
  const ok = await sSet('draw:'+id,{ data });
  if(!ok) return;
  const idx = (await sGet('didx:'+currentChild.id)) || [];
  idx.push({ id, date: todayISO() });
  await sSet('didx:'+currentChild.id, idx);
  toast('הציור נשמר ✓ 🎨');
  renderDraw();
}
async function deleteDrawing(id){
  await sDel('draw:'+id);
  let idx = (await sGet('didx:'+currentChild.id)) || [];
  idx = idx.filter(x=>x.id!==id);
  await sSet('didx:'+currentChild.id, idx);
  toast('נמחק'); renderDraw();
}

/* ---------- child payments ---------- */
function renderChildPay(){
  const list = payments.filter(p=>p.childId===currentChild.id)
    .sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const total = list.reduce((a,p)=>a+Number(p.amount),0);
  const monthTotal = list.filter(p=>p.month===thisMonth()).reduce((a,p)=>a+Number(p.amount),0);
  const box = document.getElementById('tabContent');
  box.innerHTML = `
    <div class="pay-summary">
      <div class="pay-box"><div class="num">${fmtMoney(monthTotal)}</div><div class="lbl">${monthLabel(thisMonth())}</div></div>
      <div class="pay-box"><div class="num">${fmtMoney(total)}</div><div class="lbl">סה״כ שולם</div></div>
    </div>
    <button class="btn btn-primary" onclick="openAddPayment('${currentChild.id}')">＋ רישום תשלום</button>
    <div style="margin-top:14px">
      ${list.length===0
        ? `<div class="empty-state"><div class="big">💰</div>עדיין לא נרשמו תשלומים.</div>`
        : list.map(p=>`
          <div class="item-row">
            <div class="item-head">
              <strong>${fmtMoney(p.amount)}</strong>
              <span class="item-date">${fmtDate(p.date)}</span>
              ${p.method?`<span class="item-date">${esc(p.method)}</span>`:''}
            </div>
            ${p.note?`<div class="item-body">${esc(p.note)}</div>`:''}
            <div class="item-actions">
              <button class="btn btn-danger btn-small" onclick="deletePayment('${p.id}')">מחיקה</button>
            </div>
          </div>`).join('')}
    </div>`;
}
function openAddPayment(childId){
  const opts = children.map(c=>`<option value="${c.id}" ${c.id===childId?'selected':''}>${esc(c.name)}</option>`).join('');
  openModal(`
    <h2>רישום תשלום</h2>
    <label>ילד/ה</label>
    <select id="p_child">${opts}</select>
    <label>סכום (₪) *</label>
    <input id="p_amount" inputmode="decimal" placeholder="למשל 350">
    <label>תאריך</label>
    <input id="p_date" type="date" value="${todayISO()}">
    <label>אופן תשלום</label>
    <select id="p_method">
      <option value="">— בחרו —</option>
      <option>מזומן</option><option>ביט</option><option>העברה בנקאית</option>
      <option>אשראי</option><option>צ׳ק</option><option>פייבוקס</option>
    </select>
    <label>הערה</label>
    <input id="p_note" placeholder="למשל: עבור 4 מפגשים">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">ביטול</button>
      <button class="btn btn-primary" onclick="savePayment()">שמירה</button>
    </div>
  `);
}
async function savePayment(){
  const amount = parseFloat(document.getElementById('p_amount').value);
  if(!amount || amount<=0){ toast('נא להזין סכום תקין'); return; }
  const date = document.getElementById('p_date').value || todayISO();
  payments.push({
    id: uid(),
    childId: document.getElementById('p_child').value,
    amount, date,
    month: date.slice(0,7),
    method: document.getElementById('p_method').value,
    note: document.getElementById('p_note').value.trim()
  });
  if(await sSet('payments',payments)){
    closeModal(); toast('התשלום נרשם ✓');
    if(view==='child') renderChildPay(); else renderMonthly();
  }
}
async function deletePayment(id){
  payments = payments.filter(p=>p.id!==id);
  await sSet('payments',payments);
  toast('נמחק');
  if(view==='child') renderChildPay(); else renderMonthly();
}

/* ================= MONTHLY VIEW ================= */
let selMonth = thisMonth();
function goMonthly(){
  view='monthly'; backBtn.style.display='inline-flex';
  renderMonthly();
}
function shiftMonth(d){
  const [y,m] = selMonth.split('-').map(Number);
  const dt = new Date(y, m-1+d, 1);
  selMonth = dt.toISOString().slice(0,7);
  renderMonthly();
}
function renderMonthly(){
  const list = payments.filter(p=>p.month===selMonth);
  const perChild = {};
  list.forEach(p=>{
    perChild[p.childId] = (perChild[p.childId]||0) + Number(p.amount);
  });
  const total = list.reduce((a,p)=>a+Number(p.amount),0);
  const rows = Object.entries(perChild).map(([cid,sum])=>{
    const c = children.find(x=>x.id===cid);
    const count = list.filter(p=>p.childId===cid).length;
    return `<tr>
      <td>${c?esc(c.name):'—'}</td>
      <td>${count}</td>
      <td><strong>${fmtMoney(sum)}</strong></td>
    </tr>`;
  }).join('');

  app.innerHTML = `
    <div class="section-title"><h2>מעקב תשלומים חודשי</h2><div class="scribble"></div></div>
    <div class="month-nav">
      <button class="btn btn-ghost btn-small" onclick="shiftMonth(1)">‹ הבא</button>
      <input type="month" value="${selMonth}" onchange="selMonth=this.value;renderMonthly()">
      <button class="btn btn-ghost btn-small" onclick="shiftMonth(-1)">הקודם ›</button>
      <span style="flex:1"></span>
      <button class="btn btn-primary btn-small" onclick="openAddPayment('${children[0]?children[0].id:''}')" ${children.length===0?'disabled':''}>＋ רישום תשלום</button>
    </div>
    <div class="pay-summary">
      <div class="pay-box"><div class="num">${fmtMoney(total)}</div><div class="lbl">סה״כ ${monthLabel(selMonth)}</div></div>
      <div class="pay-box"><div class="num">${list.length}</div><div class="lbl">תשלומים שנרשמו</div></div>
      <div class="pay-box"><div class="num">${Object.keys(perChild).length}</div><div class="lbl">ילדים ששילמו</div></div>
    </div>
    ${rows ? `
      <table>
        <tr><th>ילד/ה</th><th>מס׳ תשלומים</th><th>סה״כ</th></tr>
        ${rows}
        <tr style="background:#FFF7E2"><td><strong>סה״כ החודש</strong></td><td></td><td><strong>${fmtMoney(total)}</strong></td></tr>
      </table>` 
      : `<div class="empty-state"><div class="big">💰</div>לא נרשמו תשלומים ב${monthLabel(selMonth)}.</div>`}
    <div class="section-title"><h2>פירוט תשלומים</h2><div class="scribble"></div></div>
    ${list.length===0 ? '' : list.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(p=>{
      const c = children.find(x=>x.id===p.childId);
      return `<div class="item-row">
        <div class="item-head">
          <strong>${c?esc(c.name):'—'} — ${fmtMoney(p.amount)}</strong>
          <span class="item-date">${fmtDate(p.date)}</span>
          ${p.method?`<span class="item-date">${esc(p.method)}</span>`:''}
        </div>
        ${p.note?`<div class="item-body">${esc(p.note)}</div>`:''}
        <div class="item-actions">
          <button class="btn btn-danger btn-small" onclick="deletePayment('${p.id}')">מחיקה</button>
        </div>
      </div>`;
    }).join('')}
  `;
}

init();
</script>
