<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>צלילי הרגש — מרכז לטיפול רגשי לילדים ונוער</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#B7735C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="צלילי הרגש">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Frank+Ruhl+Libre:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#4A342B;
  --ink-soft:#8A6F63;
  --paper:#FAF3ED;
  --card:#FFFFFF;
  --rose:#B7735C;
  --rose-deep:#96543F;
  --gold:#E2BC97;
  --gold-deep:#C99B72;
  --line:#EBDCD1;
  --danger:#C34A5A;
  --radius:18px;
  --shadow:0 4px 16px rgba(74,52,43,.09);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Varela Round',sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  font-size:16px;
}
h1,h2,h3{font-family:'Frank Ruhl Libre',serif;font-weight:700}

header{
  background:var(--card);
  border-bottom:2px solid var(--line);
  padding:12px 18px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:20;
}
.logo{width:44px;height:44px;flex-shrink:0}
header h1{font-size:1.35rem;color:var(--rose-deep);line-height:1.1}
header .sub{font-size:.75rem;color:var(--ink-soft)}
.hdr-btns{margin-inline-start:auto;display:flex;gap:8px}
.icon-btn{
  background:none;border:2px solid var(--line);border-radius:12px;
  padding:8px 12px;font-family:inherit;font-size:.9rem;color:var(--ink);
  cursor:pointer;
}
.icon-btn:hover{border-color:var(--rose)}
#backBtn{display:none}

main{max-width:960px;margin:0 auto;padding:20px 16px 80px}

.btn{
  border:none;border-radius:14px;padding:11px 18px;
  font-family:inherit;font-size:.95rem;cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;
  transition:transform .12s, box-shadow .12s;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--rose);color:#fff;box-shadow:0 3px 0 var(--rose-deep)}
.btn-sun{background:var(--gold);color:var(--ink);box-shadow:0 3px 0 var(--gold-deep)}
.btn-ghost{background:transparent;border:2px solid var(--line);color:var(--ink)}
.btn-ghost:hover{border-color:var(--rose)}
.btn-danger{background:transparent;border:2px solid #EFC9CE;color:var(--danger)}
.btn-danger:hover{background:#FBEDEF}
.btn-small{padding:7px 12px;font-size:.85rem;border-radius:11px}

input,textarea,select{
  width:100%;font-family:inherit;font-size:1rem;color:var(--ink);
  background:#fff;border:2px solid var(--line);border-radius:13px;
  padding:11px 13px;outline:none;
}
input:focus,textarea:focus,select:focus{border-color:var(--rose)}
textarea{resize:vertical;min-height:90px}
label{display:block;font-size:.85rem;color:var(--ink-soft);margin:12px 0 5px}
label:first-child{margin-top:0}

.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
.section-title{display:flex;align-items:center;gap:10px;margin:26px 0 14px}
.section-title h2{font-size:1.15rem;color:var(--rose-deep)}
.scribble{
  height:5px;flex:1;border-radius:3px;
  background:linear-gradient(90deg,var(--gold),#EFD9C2 60%,transparent);
  opacity:.85;
}

.kids-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.kid-card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:16px;cursor:pointer;border:2px solid transparent;
  transition:transform .15s,border-color .15s;position:relative;overflow:hidden;
}
.kid-card:hover{transform:translateY(-3px);border-color:var(--rose)}
.kid-card::before{
  content:"";position:absolute;top:0;right:0;left:0;height:7px;
  background:var(--kid-color,var(--gold));
}
.kid-avatar{
  width:52px;height:52px;border-radius:50%;
  background:var(--kid-color,var(--gold));
  display:flex;align-items:center;justify-content:center;
  font-family:'Frank Ruhl Libre';font-weight:700;font-size:1.3rem;color:var(--ink);
  margin-bottom:10px;margin-top:6px;
}
.kid-card h3{font-size:1.1rem;margin-bottom:3px}
.kid-card .meta{font-size:.82rem;color:var(--ink-soft)}

.empty-state{
  text-align:center;padding:46px 20px;color:var(--ink-soft);
  background:var(--card);border-radius:var(--radius);border:2px dashed var(--line);
}
.empty-state .big{font-size:2.4rem;margin-bottom:10px}

.tabs{
  display:flex;gap:6px;background:var(--card);padding:6px;border-radius:16px;
  box-shadow:var(--shadow);margin:18px 0;overflow-x:auto;
}
.tab{
  flex:1;border:none;background:transparent;border-radius:12px;
  padding:10px 8px;font-family:inherit;font-size:.9rem;color:var(--ink-soft);
  cursor:pointer;white-space:nowrap;min-width:90px;
}
.tab.active{background:var(--rose);color:#fff}

.item-row{
  background:var(--card);border-radius:14px;box-shadow:var(--shadow);
  padding:14px 16px;margin-bottom:10px;
}
.item-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.item-head strong{font-size:1rem}
.item-date{font-size:.78rem;color:var(--ink-soft);background:var(--paper);padding:3px 9px;border-radius:8px}
.item-body{margin-top:8px;font-size:.93rem;color:var(--ink);white-space:pre-wrap;line-height:1.55}
.item-actions{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}

.modal-bg{
  position:fixed;inset:0;background:rgba(74,52,43,.45);
  display:none;align-items:flex-end;justify-content:center;z-index:50;padding:0;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:560px;
  padding:22px 20px 30px;max-height:88vh;overflow-y:auto;
  animation:slideUp .22s ease;
}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(min-width:640px){
  .modal-bg{align-items:center;padding:20px}
  .modal{border-radius:22px}
}
.modal h2{font-size:1.2rem;color:var(--rose-deep);margin-bottom:6px}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-actions .btn{flex:1;justify-content:center}

.draw-wrap{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px}
.draw-toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.crayon{
  width:34px;height:34px;border-radius:50%;border:3px solid #fff;
  box-shadow:0 0 0 2px var(--line);cursor:pointer;flex-shrink:0;
  transition:transform .12s;
}
.crayon.sel{box-shadow:0 0 0 3px var(--ink);transform:scale(1.12)}
#canvas{
  width:100%;border-radius:14px;border:2px solid var(--line);
  background:#fff;touch-action:none;cursor:crosshair;display:block;
}
.size-btn{
  width:38px;height:38px;border-radius:10px;background:var(--paper);
  border:2px solid var(--line);cursor:pointer;display:flex;
  align-items:center;justify-content:center;font-size:16px;
}
.size-btn.sel{border-color:var(--rose);background:#F5E5DC}
.size-dot{border-radius:50%;background:var(--ink)}

.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:16px}
.gal-item{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:8px;text-align:center}
.gal-item img{width:100%;border-radius:10px;border:1px solid var(--line);background:#fff}
.gal-item .meta{font-size:.75rem;color:var(--ink-soft);margin:6px 0}

.pay-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.pay-box{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:14px;text-align:center}
.pay-box .num{font-family:'Frank Ruhl Libre';font-weight:700;font-size:1.5rem;color:var(--rose-deep)}
.pay-box .lbl{font-size:.78rem;color:var(--ink-soft)}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
th,td{padding:12px 14px;text-align:right;font-size:.9rem}
th{background:var(--rose);color:#fff;font-weight:400}
tr:not(:last-child) td{border-bottom:1px solid var(--line)}
.month-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.month-nav input{max-width:190px}

#toast{
  position:fixed;bottom:22px;right:50%;transform:translateX(50%);
  background:var(--ink);color:#fff;padding:12px 22px;border-radius:14px;
  font-size:.9rem;opacity:0;pointer-events:none;transition:opacity .25s;z-index:99;
  max-width:90vw;text-align:center;
}
#toast.show{opacity:1}

.top-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.child-header{display:flex;align-items:center;gap:14px;margin-bottom:4px}
.child-header .kid-avatar{margin:0;width:58px;height:58px;font-size:1.5rem}
.child-header .info h2{font-size:1.35rem;color:var(--rose-deep)}
.child-header .info .meta{font-size:.85rem;color:var(--ink-soft)}
.hidden{display:none!important}
.loading{text-align:center;color:var(--ink-soft);padding:40px}
.hint{font-size:.78rem;color:var(--ink-soft);margin-top:6px}

/* lock screen */
#lock{
  position:fixed;inset:0;background:linear-gradient(160deg,#FBF5EF,#F3E4D7);
  z-index:100;display:none;align-items:center;justify-content:center;padding:20px;
}
#lock.show{display:flex}
.lock-card{
  background:var(--card);border-radius:24px;box-shadow:var(--shadow);
  padding:34px 26px;width:100%;max-width:380px;text-align:center;
}
.lock-card .logo{width:64px;height:64px;margin:0 auto 12px}
.lock-card h1{color:var(--rose-deep);font-size:1.6rem}
.lock-card .sub{color:var(--ink-soft);font-size:.85rem;margin-bottom:20px}
.lock-card input{text-align:center;letter-spacing:2px}
.lock-err{color:var(--danger);font-size:.85rem;margin-top:10px;min-height:1.2em}
.lock-banner{width:100%;max-width:340px;border-radius:16px;display:block;margin:2px auto 16px;box-shadow:0 6px 20px rgba(74,52,43,.16)}
header .logo img,header img.logo{width:44px;height:44px;object-fit:cover;border-radius:11px}
.logo-preview{width:52px;height:52px;border-radius:12px;object-fit:cover;border:2px solid var(--line);flex-shrink:0}
.banner-preview{width:100%;max-width:260px;border-radius:12px;border:2px solid var(--line);display:block;margin-top:8px}
.set-group{border-top:1px solid var(--line);margin-top:20px;padding-top:6px}

.receipt-box{border:2px solid var(--line);border-radius:14px;padding:18px;margin-top:12px;background:#FDFAF7}
.receipt-box .r-head{display:flex;align-items:center;gap:10px;border-bottom:2px solid var(--line);padding-bottom:10px;margin-bottom:12px}
.receipt-box .r-row{display:flex;justify-content:space-between;padding:5px 0;font-size:.92rem}
.receipt-box .r-total{font-family:'Frank Ruhl Libre';font-weight:700;font-size:1.2rem;color:var(--rose-deep);border-top:2px solid var(--line);margin-top:8px;padding-top:10px}
</style>
</head>

<script>
/* ===== universal storage ===== */
const PREFIX = 'merchav-rigshi:';
let MEM = {};
let storageMode = null;
function detectStorage(){
  if(storageMode) return storageMode;
  if(window.storage && typeof window.storage.set === 'function'){ storageMode='claude'; }
  else{
    try{ localStorage.setItem(PREFIX+'__t','1'); localStorage.removeItem(PREFIX+'__t'); storageMode='local'; }
    catch(e){ storageMode='memory'; setTimeout(()=>toast('שימו לב: הדפדפן חוסם שמירה — הנתונים לא יישמרו אחרי סגירה'),800); }
  }
  return storageMode;
}
async function sGet(key){
  const mode = detectStorage();
  try{
    if(mode==='claude'){
      try{ const r = await window.storage.get(key,false); return r?JSON.parse(r.value):null; }catch(e){ return null; }
    }
    if(mode==='local'){ const v = localStorage.getItem(PREFIX+key); return v?JSON.parse(v):null; }
    return MEM[key]!==undefined ? JSON.parse(MEM[key]) : null;
  }catch(e){ return null; }
}
async function sSet(key,val){
  const mode = detectStorage();
  const str = JSON.stringify(val);
  try{
    if(mode==='claude'){ const r = await window.storage.set(key,str,false); if(!r) throw 0; return true; }
    if(mode==='local'){ localStorage.setItem(PREFIX+key,str); return true; }
    MEM[key]=str; return true;
  }catch(e){ toast('שמירה נכשלה — ייתכן שהזיכרון מלא. נסו למחוק מסמכים או ציורים ישנים'); return false; }
}
async function sDel(key){
  const mode = detectStorage();
  try{
    if(mode==='claude'){ await window.storage.delete(key,false); }
    else if(mode==='local'){ localStorage.removeItem(PREFIX+key); }
    else{ delete MEM[key]; }
  }catch(e){}
}
async function sha256(text){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

function bName(){ return (settings&&settings.clinicName)||DEFAULT_NAME; }
function bSub(){ return (settings&&settings.clinicSub)||DEFAULT_SUB; }
function bPhone(){ return (settings&&settings.bizPhone)||DEFAULT_PHONE; }
function bBanner(){ return (settings&&('banner' in settings))?settings.banner:DEFAULT_BANNER; }
function bLogoTag(px,cls){
  if(settings&&settings.logo) return `<img class="${cls||'logo'}" src="${settings.logo}" alt="לוגו" style="width:${px}px;height:${px}px;object-fit:cover;border-radius:12px">`;
  return `<svg class="${cls||'logo'}" viewBox="0 0 48 48" style="width:${px}px;height:${px}px"><use href="#logoShape"/></svg>`;
}
function applyBranding(){
  try{ document.title = bName()+' — '+bSub(); }catch(e){}
  const hl=document.getElementById('hdrLogo'); if(hl) hl.innerHTML=bLogoTag(44);
  const ht=document.getElementById('hdrTitle'); if(ht) ht.textContent=bName();
  const hs=document.getElementById('hdrSub'); if(hs) hs.textContent=bSub();
  const lb=document.getElementById('lockBrand');
  if(lb){
    const ban=bBanner();
    if(ban){ lb.innerHTML=`<img class="lock-banner" src="${ban}" alt="${esc(bName())}">`; }
    else{ lb.innerHTML=`${bLogoTag(64)}<h1>${esc(bName())}</h1><div class="sub">${esc(bSub())}</div>`; }
  }
}

let children = [], payments = [], settings = {};
let currentChild = null, currentTab = 'notes', view = 'home';
const KID_COLORS = ['#F2D5C4','#EAD9C8','#F6E0E0','#DCE5DA','#E4D8EC','#F7E9C9','#D9E4E6'];
const app = document.getElementById('app');
const backBtn = document.getElementById('backBtn');

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm = setTimeout(()=>t.classList.remove('show'),2600);
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return (s||'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(iso){ if(!iso) return ''; return new Date(iso).toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'}); }
function fmtMoney(n){ return '₪' + Number(n||0).toLocaleString('he-IL'); }
function monthLabel(ym){
  const [y,m]=ym.split('-');
  const names=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  return names[parseInt(m)-1]+' '+y;
}
function todayISO(){ return new Date().toISOString().slice(0,10); }
function thisMonth(){ return new Date().toISOString().slice(0,7); }

const modalBg = document.getElementById('modalBg');
const modalBox = document.getElementById('modalBox');
function openModal(html){ modalBox.innerHTML = html; modalBg.classList.add('open'); }
function closeModal(){ modalBg.classList.remove('open'); modalBox.innerHTML=''; }
modalBg.addEventListener('click', e => { if(e.target===modalBg) closeModal(); });

/* ===== lock / password ===== */
const lockEl = document.getElementById('lock');
const lockBody = document.getElementById('lockBody');
const lockErr = document.getElementById('lockErr');
function showLock(){
  lockBody.innerHTML = `
    <input type="password" id="lockPin" placeholder="סיסמה" autocomplete="current-password">
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:12px" onclick="tryUnlock()">כניסה</button>`;
  applyBranding();
  lockEl.classList.add('show');
  const inp = document.getElementById('lockPin');
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });
  setTimeout(()=>inp.focus(),100);
}
async function tryUnlock(){
  const v = document.getElementById('lockPin').value;
  if(await sha256(v) === settings.pinHash){
    lockEl.classList.remove('show'); lockErr.textContent='';
  } else {
    lockErr.textContent = 'סיסמה שגויה, נסי שוב';
    document.getElementById('lockPin').value='';
  }
}
function showSetupPin(){
  lockBody.innerHTML = `
    <div style="font-size:.9rem;color:var(--ink-soft);margin-bottom:12px">בחרי סיסמה שתגן על המידע באפליקציה</div>
    <input type="password" id="pin1" placeholder="סיסמה חדשה" style="margin-bottom:8px">
    <input type="password" id="pin2" placeholder="אימות סיסמה">
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:12px" onclick="setupPin()">שמירת סיסמה</button>
    <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:8px" onclick="skipPin()">בלי סיסמה בינתיים</button>`;
  applyBranding();
  lockEl.classList.add('show');
}
async function setupPin(){
  const p1=document.getElementById('pin1').value, p2=document.getElementById('pin2').value;
  if(p1.length<4){ lockErr.textContent='סיסמה של 4 תווים לפחות'; return; }
  if(p1!==p2){ lockErr.textContent='הסיסמאות לא זהות'; return; }
  settings.pinHash = await sha256(p1);
  await sSet('settings',settings);
  lockEl.classList.remove('show'); lockErr.textContent='';
  toast('הסיסמה נשמרה ✓');
}
async function skipPin(){
  settings.pinSkipped = true;
  await sSet('settings',settings);
  lockEl.classList.remove('show');
}

async function readImage(input,maxW,quality){
  const file=input.files[0]; input.value='';
  if(!file) return null;
  const dataUrl=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});
  return await new Promise((res)=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxW){ h=Math.round(h*maxW/w); w=maxW; }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      res(cv.toDataURL('image/jpeg',quality||0.85));
    };
    img.onerror=()=>res(null);
    img.src=dataUrl;
  });
}

/* ===== backup ===== */
async function exportBackup(){
  toast('מכין גיבוי…');
  const data = { app:'tzlilei-haregesh', exportedAt:new Date().toISOString(), children, payments, settings, perChild:{} };
  for(const c of children){
    const notes = (await sGet('notes:'+c.id)) || [];
    const fidx  = (await sGet('fidx:'+c.id)) || [];
    const didx  = (await sGet('didx:'+c.id)) || [];
    const files = {}, draws = {};
    for(const f of fidx){ files[f.id] = await sGet('file:'+f.id); }
    for(const d of didx){ draws[d.id] = await sGet('draw:'+d.id); }
    data.perChild[c.id] = { notes, fidx, didx, files, draws };
  }
  const blob = new Blob([JSON.stringify(data)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'גיבוי-' + (bName().replace(/\s+/g,'-')) + '-' + todayISO() + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('קובץ הגיבוי ירד ✓ שמרי אותו במקום בטוח');
}
async function importBackup(input){
  const file = input.files[0];
  if(!file) return;
  try{
    const text = await file.text();
    const data = JSON.parse(text);
    if(data.app!=='tzlilei-haregesh' || !Array.isArray(data.children)) throw 0;
    if(!confirm('שחזור מגיבוי יחליף את כל המידע הנוכחי באפליקציה. להמשיך?')){ input.value=''; return; }
    children = data.children; payments = data.payments||[];
    const keepPin = settings.pinHash;
    settings = data.settings||{};
    if(keepPin && !settings.pinHash) settings.pinHash = keepPin;
    await sSet('children',children);
    await sSet('payments',payments);
    await sSet('settings',settings);
    for(const cid in (data.perChild||{})){
      const pc = data.perChild[cid];
      await sSet('notes:'+cid, pc.notes||[]);
      await sSet('fidx:'+cid, pc.fidx||[]);
      await sSet('didx:'+cid, pc.didx||[]);
      for(const fid in (pc.files||{})) if(pc.files[fid]) await sSet('file:'+fid, pc.files[fid]);
      for(const did in (pc.draws||{})) if(pc.draws[did]) await sSet('draw:'+did, pc.draws[did]);
    }
    toast('השחזור הושלם ✓');
    applyBranding();
    closeModal(); goHome();
  }catch(e){ toast('קובץ הגיבוי לא תקין'); }
  input.value='';
}

let drawColor = CRAYONS[0], drawSize = 6, erasing = false, textMode = false;
async function renderDraw(){
  const idx = (await sGet('didx:'+currentChild.id))||[];
  idx.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  document.getElementById('tabContent').innerHTML = `
    <div class="draw-wrap">
      <div class="draw-toolbar" id="crayons">
        ${CRAYONS.map(c=>`<div class="crayon ${c===drawColor&&!erasing&&!textMode?'sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`).join('')}
        <button class="size-btn ${erasing?'sel':''}" title="מחק" onclick="pickEraser()">🧽</button>
        <button class="size-btn ${textMode?'sel':''}" title="כתיבת טקסט" onclick="pickText()">א</button>
      </div>
      <div class="draw-toolbar">
        ${[3,6,12,22].map(s=>`
          <button class="size-btn ${s===drawSize?'sel':''}" onclick="pickSize(${s})">
            <span class="size-dot" style="width:${Math.min(s,20)}px;height:${Math.min(s,20)}px"></span>
          </button>`).join('')}
        <span style="flex:1"></span>
        <button class="btn btn-ghost btn-small" onclick="document.getElementById('drawImgInput').click()">🖼️ תמונה לציור</button>
        <input type="file" id="drawImgInput" class="hidden" accept="image/*" onchange="loadImageToCanvas(this)">
        <button class="btn btn-ghost btn-small" onclick="undoDraw()">↩️ בטל</button>
        <button class="btn btn-ghost btn-small" onclick="clearCanvas()">🗑 נקה</button>
        <button class="btn btn-sun btn-small" onclick="saveDrawing()">💾 שמירת ציור</button>
      </div>
      <canvas id="canvas" width="900" height="620"></canvas>
      <div class="hint">אפשר להעלות תמונה (דף עבודה, מנדלה, תמונה אישית) ולצייר או לכתוב עליה. כפתור ״א״ = כתיבת טקסט בלחיצה על הציור.</div>
    </div>
    <div class="section-title"><h2>הציורים של ${esc(currentChild.name)}</h2><div class="scribble"></div></div>
    ${idx.length===0
      ? `<div class="empty-state"><div class="big">🎨</div>עדיין אין ציורים שמורים.</div>`
      : `<div class="gallery">${idx.map(d=>`
          <div class="gal-item">
            <img data-did="${d.id}" alt="ציור">
            <div class="meta">${fmtDate(d.date)}</div>
            <button class="btn btn-danger btn-small" onclick="deleteDrawing('${d.id}')">מחיקה</button>
          </div>`).join('')}</div>`}`;
  setupCanvas();
  for(const d of idx){
    const rec = await sGet('draw:'+d.id);
    const img = document.querySelector(`img[data-did="${d.id}"]`);
    if(img&&rec) img.src = rec.data;
  }
}
function pickColor(c){ drawColor=c; erasing=false; textMode=false; refreshTools(); }
function pickEraser(){ erasing=true; textMode=false; refreshTools(); }
function pickText(){ textMode=!textMode; erasing=false; refreshTools(); if(textMode) toast('לחצי על הציור במקום שבו תרצי לכתוב'); }
function pickSize(s){ drawSize=s; refreshTools(); }
function refreshTools(){
  document.querySelectorAll('#crayons .crayon').forEach((el,i)=>{
    el.classList.toggle('sel', CRAYONS[i]===drawColor && !erasing && !textMode);
  });
  document.querySelectorAll('.size-btn').forEach(el=>{
    const t = el.textContent.trim();
    if(t==='🧽') el.classList.toggle('sel', erasing);
    else if(t==='א') el.classList.toggle('sel', textMode);
  });
  document.querySelectorAll('.size-btn .size-dot').forEach(dot=>{
    const s = parseInt(dot.style.width);
    dot.parentElement.classList.toggle('sel', s===Math.min(drawSize,20));
  });
}
let cvs, ctx, drawing=false, undoStack=[];
function pushUndo(){ if(undoStack.length>=12) undoStack.shift(); undoStack.push(ctx.getImageData(0,0,cvs.width,cvs.height)); }
function setupCanvas(){
  cvs = document.getElementById('canvas');
  ctx = cvs.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,cvs.width,cvs.height);
  ctx.lineCap='round'; ctx.lineJoin='round';
  undoStack=[];
  const pos = e => {
    const r = cvs.getBoundingClientRect();
    return { x:(e.clientX-r.left)*(cvs.width/r.width), y:(e.clientY-r.top)*(cvs.height/r.height) };
  };
  cvs.onpointerdown = e => {
    e.preventDefault();
    const p = pos(e);
    if(textMode){
      const txt = prompt('מה לכתוב?');
      if(txt){
        pushUndo();
        ctx.fillStyle = drawColor;
        ctx.font = (drawSize*5+10) + 'px Varela Round';
        ctx.textAlign = 'center';
        ctx.fillText(txt, p.x, p.y);
      }
      return;
    }
    cvs.setPointerCapture(e.pointerId);
    pushUndo();
    drawing=true;
    ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+0.1,p.y+0.1);
    strokeNow();
  };
  cvs.onpointermove = e => {
    if(!drawing) return;
    e.preventDefault();
    const p = pos(e);
    ctx.lineTo(p.x,p.y);
    strokeNow();
  };
  cvs.onpointerup = cvs.onpointercancel = ()=>{ drawing=false; };
}
function strokeNow(){
  ctx.strokeStyle = erasing ? '#ffffff' : drawColor;
  ctx.lineWidth = erasing ? drawSize*3 : drawSize;
  ctx.stroke();
}
function undoDraw(){ if(undoStack.length===0) return; ctx.putImageData(undoStack.pop(),0,0); }
function clearCanvas(){ pushUndo(); ctx.fillStyle='#fff'; ctx.fillRect(0,0,cvs.width,cvs.height); }
async function loadImageToCanvas(input){
  const file = input.files[0];
  if(!file) return;
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = ()=>{
    pushUndo();
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,cvs.width,cvs.height);
    const scale = Math.min(cvs.width/img.width, cvs.height/img.height);
    const w = img.width*scale, h = img.height*scale;
    ctx.drawImage(img, (cvs.width-w)/2, (cvs.height-h)/2, w, h);
    URL.revokeObjectURL(url);
    toast('התמונה נטענה — אפשר לצייר ולכתוב עליה 🎨');
  };
  img.src = url;
  input.value='';
}
async function saveDrawing(){
  const data = cvs.toDataURL('image/jpeg',0.82);
  const id = uid();
  const ok = await sSet('draw:'+id,{ data });
  if(!ok) return;
  const idx = (await sGet('didx:'+currentChild.id))||[];
  idx.push({ id, date:todayISO() });
  await sSet('didx:'+currentChild.id, idx);
  toast('הציור נשמר ✓ 🎨'); renderDraw();
}
async function deleteDrawing(id){
  await sDel('draw:'+id);
  let idx = (await sGet('didx:'+currentChild.id))||[];
  idx = idx.filter(x=>x.id!==id);
  await sSet('didx:'+currentChild.id, idx);
  toast('נמחק'); renderDraw();
}

/* ===== payments ===== */
function renderChildPay(){
  const list = payments.filter(p=>p.childId===currentChild.id).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const total = list.reduce((a,p)=>a+Number(p.amount),0);
  const monthTotal = list.filter(p=>p.month===thisMonth()).reduce((a,p)=>a+Number(p.amount),0);
  document.getElementById('tabContent').innerHTML = `
    <div class="pay-summary">
      <div class="pay-box"><div class="num">${fmtMoney(monthTotal)}</div><div class="lbl">${monthLabel(thisMonth())}</div></div>
      <div class="pay-box"><div class="num">${fmtMoney(total)}</div><div class="lbl">סה״כ שולם</div></div>
    </div>
    <button class="btn btn-primary" onclick="openAddPayment('${currentChild.id}')">＋ רישום תשלום</button>
    <div style="margin-top:14px">${payRows(list)}</div>`;
}
function payRows(list){
  if(list.length===0) return `<div class="empty-state"><div class="big">💰</div>עדיין לא נרשמו תשלומים.</div>`;
  return list.map(p=>{
    const c = children.find(x=>x.id===p.childId);
    return `<div class="item-row">
      <div class="item-head">
        <strong>${view==='monthly'&&c?esc(c.name)+' — ':''}${fmtMoney(p.amount)}</strong>
        <span class="item-date">${fmtDate(p.date)}</span>
        ${p.method?`<span class="item-date">${esc(p.method)}</span>`:''}
        ${p.receiptNo?`<span class="item-date">אישור מס׳ ${p.receiptNo}</span>`:''}
      </div>
      ${p.note?`<div class="item-body">${esc(p.note)}</div>`:''}
      <div class="item-actions">
        <button class="btn btn-sun btn-small" onclick="openReceipt('${p.id}')">🧾 אישור תשלום</button>
        <button class="btn btn-danger btn-small" onclick="deletePayment('${p.id}')">מחיקה</button>
      </div>
    </div>`;
  }).join('');
}
function openAddPayment(childId){
  const opts = children.map(c=>`<option value="${c.id}" ${c.id===childId?'selected':''}>${esc(c.name)}</option>`).join('');
  openModal(`
    <h2>רישום תשלום</h2>
    <label>ילד/ה</label>
    <select id="p_child">${opts}</select>
    <label>סכום (₪) *</label>
    <input id="p_amount" inputmode="decimal" placeholder="למשל 350">
    <label>תאריך</label>
    <input id="p_date" type="date" value="${todayISO()}">
    <label>אופן תשלום</label>
    <select id="p_method">
      <option value="">— בחרי —</option>
      <option>מזומן</option><option>ביט</option><option>העברה בנקאית</option>
      <option>אשראי</option><option>צ׳ק</option><option>פייבוקס</option>
    </select>
    <label>הערה</label>
    <input id="p_note" placeholder="למשל: עבור 4 מפגשים">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">ביטול</button>
      <button class="btn btn-primary" onclick="savePayment()">שמירה</button>
    </div>`);
}
async function savePayment(){
  const amount = parseFloat(document.getElementById('p_amount').value);
  if(!amount||amount<=0){ toast('נא להזין סכום תקין'); return; }
  const date = document.getElementById('p_date').value||todayISO();
  const p = {
    id:uid(),
    childId:document.getElementById('p_child').value,
    amount, date, month:date.slice(0,7),
    method:document.getElementById('p_method').value,
    note:document.getElementById('p_note').value.trim()
  };
  payments.push(p);
  if(await sSet('payments',payments)){
    closeModal(); toast('התשלום נרשם ✓');
    if(view==='child') renderChildPay(); else renderMonthly();
  }
}
async function deletePayment(id){
  payments = payments.filter(p=>p.id!==id);
  await sSet('payments',payments);
  toast('נמחק');
  if(view==='child') renderChildPay(); else renderMonthly();
}

/* ===== payment confirmation (receipt-style) ===== */
async function openReceipt(pid){
  const p = payments.find(x=>x.id===pid);
  if(!p) return;
  const c = children.find(x=>x.id===p.childId);
  if(!p.receiptNo){
    settings.receiptCounter = (settings.receiptCounter||0)+1;
    p.receiptNo = settings.receiptCounter;
    await sSet('settings',settings);
    await sSet('payments',payments);
  }
  const title = settings.receiptTitle || 'אישור תשלום';
  const bizName = settings.bizName || (bName()+' · צליל הדסה יפרח');
  const subLine = [bSub(), bPhone(), settings.bizAddr].filter(Boolean).join(' · ');
  const footer = ('receiptFooter' in settings) ? settings.receiptFooter : 'אישור זה מונפק לנוחות המעקב ואינו מהווה קבלה רשמית לצורכי מס';
  openModal(`
    <h2>🧾 ${esc(title)}</h2>
    <div class="receipt-box" id="receiptPrint">
      <div class="r-head">
        <svg width="38" height="38" viewBox="0 0 48 48"><use href="#logoShape"/></svg>
        <div>
          <div style="font-family:'Frank Ruhl Libre';font-weight:700;font-size:1.15rem;color:var(--rose-deep)">${esc(bizName)}</div>
          <div style="font-size:.75rem;color:var(--ink-soft)">${esc(subLine)}</div>
          ${settings.bizId?`<div style="font-size:.72rem;color:var(--ink-soft)">עוסק מס׳ ${esc(settings.bizId)}</div>`:''}
        </div>
      </div>
      <div class="r-row"><span>${esc(title)} מס׳</span><strong>${p.receiptNo}</strong></div>
      <div class="r-row"><span>תאריך</span><span>${fmtDate(p.date)}</span></div>
      <div class="r-row"><span>עבור</span><span>${c?esc(c.name):'—'}${c&&c.parent?' (הורה: '+esc(c.parent)+')':''}</span></div>
      ${p.method?`<div class="r-row"><span>אופן תשלום</span><span>${esc(p.method)}</span></div>`:''}
      ${p.note?`<div class="r-row"><span>פירוט</span><span>${esc(p.note)}</span></div>`:''}
      <div class="r-row r-total"><span>סכום ששולם</span><span>${fmtMoney(p.amount)}</span></div>
      ${footer?`<div style="font-size:.7rem;color:var(--ink-soft);margin-top:12px;text-align:center">${esc(footer)}</div>`:''}
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="printReceipt()">🖨 הדפסה / שמירה כ-PDF</button>
      <button class="btn btn-ghost" onclick="closeModal()">סגירה</button>
    </div>`);
}
function printReceipt(){
  const content = document.getElementById('receiptPrint').outerHTML;
  const defs = document.querySelector('svg[width="0"]').outerHTML;
  const w = window.open('','_blank');
  if(!w){ toast('הדפדפן חסם את חלון ההדפסה — אפשרי צילום מסך'); return; }
  w.document.write(`<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><title>${esc((settings.receiptTitle||'אישור תשלום')+' — '+bName())}</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Frank+Ruhl+Libre:wght@700&display=swap" rel="stylesheet">
    <style>
      body{font-family:'Varela Round',sans-serif;color:#4A342B;padding:30px;background:#fff}
      .receipt-box{border:2px solid #EBDCD1;border-radius:14px;padding:22px;max-width:480px;margin:0 auto;background:#FDFAF7}
      .r-head{display:flex;align-items:center;gap:10px;border-bottom:2px solid #EBDCD1;padding-bottom:10px;margin-bottom:12px}
      .r-row{display:flex;justify-content:space-between;padding:5px 0;font-size:.95rem}
      .r-total{font-family:'Frank Ruhl Libre';font-weight:700;font-size:1.25rem;color:#96543F;border-top:2px solid #EBDCD1;margin-top:8px;padding-top:10px}
    </style></head><body>${defs}${content}<script>setTimeout(()=>window.print(),600)<\/script></body></html>`);
  w.document.close();
}

/* ===== monthly ===== */
let selMonth = thisMonth();
function goMonthly(){ view='monthly'; backBtn.style.display='inline-flex'; renderMonthly(); }
function shiftMonth(d){
  const [y,m] = selMonth.split('-').map(Number);
  selMonth = new Date(y, m-1+d, 1).toISOString().slice(0,7);
  renderMonthly();
}
function renderMonthly(){
  const list = payments.filter(p=>p.month===selMonth);
  const perChild = {};
  list.forEach(p=>{ perChild[p.childId]=(perChild[p.childId]||0)+Number(p.amount); });
  const total = list.reduce((a,p)=>a+Number(p.amount),0);
  const rows = Object.entries(perChild).map(([cid,sum])=>{
    const c = children.find(x=>x.id===cid);
    const count = list.filter(p=>p.childId===cid).length;
    return `<tr><td>${c?esc(c.name):'—'}</td><td>${count}</td><td><strong>${fmtMoney(sum)}</strong></td></tr>`;
  }).join('');
  app.innerHTML = `
    <div class="section-title"><h2>מעקב תשלומים חודשי</h2><div class="scribble"></div></div>
    <div class="month-nav">
      <button class="btn btn-ghost btn-small" onclick="shiftMonth(1)">‹ הבא</button>
      <input type="month" value="${selMonth}" onchange="selMonth=this.value;renderMonthly()">
      <button class="btn btn-ghost btn-small" onclick="shiftMonth(-1)">הקודם ›</button>
      <span style="flex:1"></span>
      <button class="btn btn-primary btn-small" onclick="openAddPayment('${children[0]?children[0].id:''}')" ${children.length===0?'disabled':''}>＋ רישום תשלום</button>
    </div>
    <div class="pay-summary">
      <div class="pay-box"><div class="num">${fmtMoney(total)}</div><div class="lbl">סה״כ ${monthLabel(selMonth)}</div></div>
      <div class="pay-box"><div class="num">${list.length}</div><div class="lbl">תשלומים שנרשמו</div></div>
      <div class="pay-box"><div class="num">${Object.keys(perChild).length}</div><div class="lbl">ילדים ששילמו</div></div>
    </div>
    ${rows?`
      <table>
        <tr><th>ילד/ה</th><th>מס׳ תשלומים</th><th>סה״כ</th></tr>
        ${rows}
        <tr style="background:#F8EEE3"><td><strong>סה״כ החודש</strong></td><td></td><td><strong>${fmtMoney(total)}</strong></td></tr>
      </table>`
      :`<div class="empty-state"><div class="big">💰</div>לא נרשמו תשלומים ב${monthLabel(selMonth)}.</div>`}
    <div class="section-title"><h2>פירוט תשלומים</h2><div class="scribble"></div></div>
    ${payRows(list.sort((a,b)=>(b.date||'').localeCompare(a.date||'')))}`;
}

/* ===== install as app (PWA) ===== */
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; });
window.addEventListener('appinstalled', () => { deferredPrompt = null; toast('האפליקציה הותקנה ✓'); });
function isStandalone(){
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}
async function installApp(){
  if(isStandalone()){ toast('האפליקציה כבר מותקנת 🙂'); return; }
  if(deferredPrompt){
    deferredPrompt.prompt();
    try{ await deferredPrompt.userChoice; }catch(e){}
    deferredPrompt = null;
    return;
  }
  const iOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  openModal(`
    <h2>📲 התקנת האפליקציה</h2>
    <div class="hint" style="margin-top:6px">כך מוסיפים את "צלילי הרגש" למסך הבית — היא תיפתח במסך מלא כמו אפליקציה רגילה.</div>
    ${iOS ? `
      <ol style="margin:14px 18px 0;font-size:.95rem;line-height:1.9">
        <li>הקישי על כפתור <b>השיתוף</b> ⬆️ בתחתית הדפדפן (Safari)</li>
        <li>גללי ובחרי <b>הוספה למסך הבית</b></li>
        <li>הקישי <b>הוספה</b> — והאייקון יופיע במסך הבית 💛</li>
      </ol>` : `
      <ol style="margin:14px 18px 0;font-size:.95rem;line-height:1.9">
        <li>פתחי את <b>תפריט הדפדפן</b> (⋮ בפינה)</li>
        <li>בחרי <b>התקנת אפליקציה</b> / <b>הוספה למסך הבית</b></li>
        <li>אשרי — והאייקון יופיע במסך הבית 💛</li>
      </ol>`}
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="closeModal()">הבנתי</button>
    </div>`);
}
if('serviceWorker' in navigator){
  window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}

init();
